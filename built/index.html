<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Compiler</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e;
      --bg-surface: #252536;
      --bg-elevated: #2d2d44;
      --border: #3e3e5e;
      --text: #cdd6f4;
      --text-muted: #888caa;
      --accent: #89b4fa;
      --accent-hover: #a6c8ff;
      --error: #f38ba8;
      --success: #a6e3a1;
      --warning: #fab387;
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --toolbar-h: 48px;
    }

    :root.light {
      --bg: #eff1f5;
      --bg-surface: #ffffff;
      --bg-elevated: #e6e9ef;
      --border: #ccd0da;
      --text: #4c4f69;
      --text-muted: #7c7f93;
      --accent: #1e66f5;
      --accent-hover: #2a7aff;
      --error: #d20f39;
      --success: #40a02b;
      --warning: #df8e1d;
    }

    html, body { height: 100%; font-family: var(--font-sans); background: var(--bg); color: var(--text); }

    /* Toolbar */
    #toolbar {
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    #toolbar h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
    #toolbar button, #toolbar select {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    #toolbar button:hover { background: var(--accent); color: #fff; }
    #toolbar .compile-btn { background: var(--accent); color: #fff; font-weight: 600; }
    #toolbar .compile-btn:hover { background: var(--accent-hover); }

    /* Panels container */
    #panels {
      display: flex;
      height: calc(100vh - var(--toolbar-h));
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-width: 80px;
      position: relative;
      background: var(--bg-surface);
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .panel-header button {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }
    .panel-body { flex: 1; overflow: auto; }

    /* Drag handles */
    .drag-handle {
      width: 5px;
      cursor: col-resize;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .drag-handle:hover, .drag-handle.active { background: var(--accent); }

    /* Editor */
    #editor-area {
      width: 100%;
      height: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      background: var(--bg-surface);
      color: var(--text);
      tab-size: 2;
    }

    /* Sidebar (files + outline) */
    #sidebar {
      width: 220px;
      min-width: 120px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-tabs {
      display: flex;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .sidebar-tabs button {
      flex: 1;
      padding: 6px 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sidebar-tabs button.active { border-bottom-color: var(--accent); color: var(--text); }
    .sidebar-actions { margin-left: auto; display: flex; gap: 2px; align-items: center; }
    .sidebar-actions button {
      padding: 2px 6px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      border-radius: 4px;
    }
    .sidebar-actions button:hover { background: var(--bg-elevated); color: var(--text); }

    /* File tree */
    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
      font-size: 12px;
    }
    .file-entry {
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 4px;
    }
    .file-entry:hover { background: var(--bg-elevated); }
    .file-entry.active { background: var(--accent); color: #fff; }
    .file-entry.directory { font-weight: 600; }
    .file-icon { flex-shrink: 0; width: 16px; text-align: center; font-size: 11px; }
    .file-name { overflow: hidden; text-overflow: ellipsis; }

    /* Inline rename/create input */
    .file-entry input.inline-input {
      border: 1px solid var(--accent);
      background: var(--bg-elevated);
      color: var(--text);
      font-size: 12px;
      font-family: var(--font-sans);
      outline: none;
      padding: 1px 4px;
      border-radius: 3px;
      width: 100%;
    }

    /* Outline sidebar */
    #outline {
      flex: 1;
      padding: 8px;
      overflow-y: auto;
      font-size: 12px;
    }
    #outline .outline-item {
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #outline .outline-item:hover { background: var(--bg-elevated); }
    #outline .outline-item.h2 { padding-left: 16px; }
    #outline .outline-item.h3 { padding-left: 28px; }

    /* Folder name in toolbar */
    #folder-name {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Compilation output (xterm container) */
    #compile-output {
      width: 100%;
      height: 100%;
      background: var(--bg-surface);
    }
    #compile-output .xterm {
      padding: 8px;
    }

    /* Compile status */
    #compile-status {
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    #compile-status.error { color: var(--error); }
    #compile-status.success { color: var(--success); }

    /* Preview */
    #preview-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    /* Console log */
    #console-log {
      max-height: 150px;
      overflow-y: auto;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-elevated);
    }
    #console-log .log-entry { padding: 2px 0; }
    #console-log .log-warn { color: var(--warning); }
    #console-log .log-error { color: var(--error); }

    /* Settings Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 480px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h2 { margin-bottom: 16px; font-size: 18px; }
    .modal label { display: block; margin-bottom: 12px; font-size: 13px; }
    .modal label span { display: block; margin-bottom: 4px; color: var(--text-muted); }
    .modal input, .modal select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-mono);
    }
    .modal .warn { color: var(--warning); font-size: 11px; margin-top: 2px; }
    .modal .btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .modal button {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .modal button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* History drawer */
    #history-drawer {
      display: none;
      position: absolute;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      z-index: 50;
      flex-direction: column;
    }
    #history-drawer.open { display: flex; }
    #history-drawer .drawer-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
    }
    #history-drawer .drawer-header button { margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; }
    #history-list { flex: 1; overflow-y: auto; padding: 8px; }
    .history-item {
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .history-item:hover { background: var(--bg-elevated); }
    .history-item .timestamp { color: var(--text-muted); }

    /* Viewport control */
    #viewport-controls {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    #viewport-controls button {
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-surface);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
    }
    #viewport-controls button.active { border-color: var(--accent); color: var(--accent); }

    /* Markdown preview */
    #md-preview {
      display: none;
      padding: 16px 24px;
      overflow-y: auto;
      line-height: 1.7;
      font-size: 15px;
    }
    #md-preview h1, #md-preview h2, #md-preview h3 { margin: 20px 0 8px; }
    #md-preview h1 { font-size: 24px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    #md-preview h2 { font-size: 20px; }
    #md-preview h3 { font-size: 16px; }
    #md-preview code {
      font-family: var(--font-mono);
      background: var(--bg-elevated);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    #md-preview pre { background: var(--bg-elevated); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    #md-preview pre code { background: none; padding: 0; }
    #md-preview ul, #md-preview ol { padding-left: 24px; margin: 8px 0; }
    #md-preview blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 12px 0; }
    #md-preview a { color: var(--accent); }

    /* Preview/Edit tabs */
    .editor-tabs {
      display: flex;
      gap: 0;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .editor-tabs button {
      padding: 6px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .editor-tabs button.active { border-bottom-color: var(--accent); color: var(--text); }

    /* Auth styles */
    .auth-section {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .auth-section h3 { margin-bottom: 12px; font-size: 14px; }
    #auth-signed-in { display: none; }
    #auth-device-flow { display: none; }
    .auth-user { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .auth-user img { width: 32px; height: 32px; border-radius: 50%; }
    .auth-user span { font-weight: 600; }
    #device-code-display {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 4px;
      text-align: center;
      padding: 16px;
      background: var(--bg-elevated);
      border-radius: 8px;
      margin: 12px 0;
      color: var(--accent);
    }
    #auth-status { font-size: 12px; color: var(--text-muted); margin-top: 8px; }
    #toolbar-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: none;
      vertical-align: middle;
    }
    #toolbar-user {
      display: none;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <h1>Blueprint Compiler</h1>
    <button id="open-folder-btn" title="Open Folder (Cmd+Shift+O)">&#128193; Open Folder</button>
    <span id="folder-name"></span>
    <button class="compile-btn" id="compile-btn" title="Cmd/Ctrl+B">&#9654; Compile</button>
    <img id="toolbar-avatar" src="" alt="avatar">
    <span id="toolbar-user"></span>
    <button id="toolbar-sign-in">Sign in with GitHub</button>
    <button id="theme-toggle" title="Toggle theme">&#9681;</button>
    <button id="settings-btn" title="Settings">&#9881;</button>
  </div>

  <!-- Main panels -->
  <div id="panels">
    <!-- Editor Panel -->
    <div class="panel" id="editor-panel" style="flex: 1;">
      <div class="panel-header">
        <span>Editor</span>
        <div class="editor-tabs" style="margin-left: auto;">
          <button class="active" id="tab-edit">Edit</button>
          <button id="tab-preview">Preview</button>
        </div>
      </div>
      <div class="panel-body" style="display: flex;">
        <div id="sidebar">
          <div class="sidebar-tabs">
            <button class="active" id="sidebar-files">Files</button>
            <button id="sidebar-outline">Outline</button>
            <span class="sidebar-actions">
              <button id="new-file-btn" title="New File">&#128196;</button>
              <button id="new-folder-btn" title="New Folder">&#128193;</button>
              <button id="delete-btn" title="Delete">&#128465;</button>
            </span>
          </div>
          <div id="file-tree"></div>
          <div id="outline" style="display: none;"></div>
        </div>
        <textarea id="editor-area" spellcheck="false" placeholder="Open a folder and select a file to start editing..."></textarea>
        <div id="md-preview" class="panel-body"></div>
      </div>
    </div>

    <div class="drag-handle" data-left="editor-panel" data-right="compile-panel"></div>

    <!-- Compilation Panel -->
    <div class="panel" id="compile-panel" style="flex: 1; position: relative;">
      <div class="panel-header">
        <span>Compilation Output</span>
        <button id="save-output-btn" title="Save output to file">&#128190;</button>
        <button id="toggle-preview-btn" title="Toggle preview panel">&#9654;</button>
        <button id="history-btn" title="History">&#128337;</button>
      </div>
      <div class="panel-body">
        <div id="compile-output"></div>
      </div>
      <div id="compile-status">Ready</div>
      <!-- History drawer -->
      <div id="history-drawer">
        <div class="drawer-header">
          <span>History</span>
          <button id="history-close">&times;</button>
        </div>
        <div id="history-list"></div>
      </div>
    </div>

    <div class="drag-handle" data-left="compile-panel" data-right="preview-panel"></div>

    <!-- Preview Panel -->
    <div class="panel collapsed" id="preview-panel" style="flex: none; width: 0; min-width: 0; overflow: hidden;">
      <div class="panel-header">
        <span>Preview</span>
        <button id="preview-refresh" title="Refresh">&#8635;</button>
        <button id="preview-popout" title="Open in new tab">&#8599;</button>
      </div>
      <div id="viewport-controls">
        <button class="active" data-width="100%">Desktop</button>
        <button data-width="768px">Tablet</button>
        <button data-width="375px">Mobile</button>
      </div>
      <div class="panel-body">
        <iframe id="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
      </div>
      <div id="console-log"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2>Settings</h2>

      <!-- Auth section -->
      <div class="auth-section">
        <h3>GitHub Account</h3>
        <div id="auth-signed-out">
          <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">Sign in with your GitHub account to use your Copilot subscription for compilation.</p>
          <button id="sign-in-btn" class="primary">Sign in with GitHub</button>
        </div>
        <div id="auth-device-flow">
          <p style="font-size: 13px; margin-bottom: 8px;">Enter this code on GitHub:</p>
          <div id="device-code-display">--------</div>
          <button id="copy-open-github" class="primary" style="width: 100%;">Copy Code &amp; Open GitHub</button>
          <div id="auth-status"></div>
        </div>
        <div id="auth-signed-in">
          <div class="auth-user">
            <img id="user-avatar" src="" alt="avatar">
            <span id="user-login"></span>
          </div>
          <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">Using Copilot subscription for LLM access.</p>
          <button id="sign-out-btn">Sign Out</button>
        </div>
      </div>

      <label>
        <span>Model</span>
        <select id="setting-model">
          <option value="claude-opus-4.6">claude-opus-4.6</option>
        </select>
      </label>
      <label>
        <span>Temperature</span>
        <input type="range" id="setting-temp" min="0" max="1" step="0.1" value="0">
        <span id="temp-display">0</span>
      </label>
      <label>
        <span>Max Tokens</span>
        <input type="number" id="setting-max-tokens" value="16000">
      </label>
      <label>
        <span>Font Size (px)</span>
        <input type="number" id="setting-font-size" value="14" min="10" max="24">
      </label>
      <div class="btn-row">
        <button id="export-project">Export Project</button>
        <button id="import-project">Import Project</button>
        <button class="primary" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
