<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' http: https: ws: wss:; frame-src 'self' http: https:;">
  <title>Blueprint Implementer</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-surface: #2d2d2d;
      --bg-hover: #3c3c3c;
      --text: #d4d4d4;
      --text-muted: #808080;
      --accent: #007acc;
      --accent-hover: #1e90ff;
      --border: #3c3c3c;
      --success: #4ec9b0;
      --warning: #dcdcaa;
      --error: #f14c4c;
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f3f3f3;
      --bg-surface: #e8e8e8;
      --bg-hover: #d4d4d4;
      --text: #1e1e1e;
      --text-muted: #6e6e6e;
      --border: #c8c8c8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      height: 48px;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .toolbar-separator {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .toolbar-btn {
      background: transparent;
      border: none;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-btn:hover {
      background: var(--bg-hover);
    }

    .toolbar-btn.primary {
      background: var(--accent);
      color: white;
    }

    .toolbar-btn.primary:hover {
      background: var(--accent-hover);
    }

    #folder-name {
      color: var(--text-muted);
      font-size: 13px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #user-display {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .user-login {
      font-size: 13px;
      color: var(--text-muted);
    }

    #model-select {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* Main layout */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 250px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      gap: 4px;
    }

    .sidebar-tab {
      padding: 6px 12px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
    }

    .sidebar-tab.active {
      color: var(--text);
      background: var(--bg-surface);
    }

    .sidebar-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .sidebar-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 4px;
      cursor: pointer;
      font-size: 14px;
      border-radius: 4px;
    }

    .sidebar-actions button:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .sidebar-panel {
      flex: 1;
      overflow-y: auto;
      display: none;
    }

    .sidebar-panel.active {
      display: block;
    }

    /* File tree */
    #file-tree {
      padding: 8px 0;
    }

    .file-tree-item {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 13px;
      gap: 6px;
    }

    .file-tree-item:hover {
      background: var(--bg-hover);
    }

    .file-tree-item.active,
    .file-tree-item.selected {
      background: var(--accent);
      color: white;
    }

    .file-tree-item .arrow {
      width: 12px;
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
    }

    .file-tree-item .icon {
      font-size: 14px;
    }

    .file-tree-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Git status */
    #git-list {
      padding: 8px;
    }

    .git-item {
      display: flex;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
      gap: 8px;
    }

    .git-badge {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
    }

    .git-badge.modified { background: var(--warning); color: #1e1e1e; }
    .git-badge.added { background: var(--success); color: #1e1e1e; }
    .git-badge.deleted { background: var(--error); color: white; }
    .git-badge.renamed { background: var(--warning); color: #1e1e1e; }
    .git-badge.untracked { background: var(--text-muted); color: white; }

    .git-file {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .no-changes {
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px;
    }

    /* Drag handles */
    .drag-handle-v {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
    }

    .drag-handle-v:hover {
      background: var(--accent);
    }

    .drag-handle-h {
      height: 4px;
      cursor: row-resize;
      background: transparent;
      flex-shrink: 0;
    }

    .drag-handle-h:hover {
      background: var(--accent);
    }

    /* Center panel (editor) */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .panel-tab {
      padding: 6px 12px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
    }

    .panel-tab.active {
      color: var(--text);
      background: var(--bg-surface);
    }

    /* Editor area */
    .editor-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-panel.active {
      display: flex;
    }

    #editor-textarea {
      flex: 1;
      background: var(--bg-primary);
      color: var(--text);
      border: none;
      resize: none;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', 'Monaco', 'Inconsolata', monospace;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
    }

    /* Browser panel */
    .browser-toolbar {
      display: flex;
      align-items: center;
      padding: 8px;
      gap: 8px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }

    #address-bar {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
    }

    #go-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    #go-btn:hover {
      background: var(--bg-hover);
    }

    #preview-iframe {
      flex: 1;
      border: none;
      background: white;
    }

    /* Terminal panel */
    #terminal-panel {
      height: 200px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
    }

    /* Right panel */
    #right-panel {
      width: 400px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      flex-shrink: 0;
    }

    .right-panel-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .output-panel,
    .chat-panel {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .output-panel.active,
    .chat-panel.active {
      display: flex;
    }

    /* Output terminal */
    #output-terminal {
      flex: 1;
      overflow: hidden;
      padding: 8px;
    }

    .output-header {
      display: flex;
      align-items: center;
      padding: 8px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    #implement-status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    #implement-status.implementing {
      background: var(--accent);
      color: white;
    }

    #implement-status.success {
      background: var(--success);
      color: #1e1e1e;
    }

    #implement-status.error {
      background: var(--error);
      color: white;
    }

    /* Chat panel */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message {
      max-width: 85%;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .chat-message.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
    }

    .chat-message.assistant {
      align-self: flex-start;
      background: var(--bg-surface);
    }

    .chat-message pre {
      background: var(--bg-primary);
      padding: 12px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .chat-message code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 4px;
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }

    #chat-send-btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    #chat-send-btn:hover {
      background: var(--accent-hover);
    }

    #chat-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #chat-indicator {
      display: none;
      color: var(--text-muted);
      font-size: 12px;
      padding: 4px 12px;
    }

    /* Settings Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.visible {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: 8px;
      width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
    }

    .close-btn:hover {
      color: var(--text);
    }

    .modal-body {
      padding: 16px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .setting-row:last-child {
      border-bottom: none;
    }

    .setting-label {
      font-size: 14px;
    }

    .setting-input {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      width: 120px;
    }

    .modal-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .modal-footer button {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .modal-footer button:hover {
      background: var(--bg-hover);
    }

    /* History Drawer */
    #history-drawer {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: var(--bg-secondary);
      box-shadow: -4px 0 16px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      flex-direction: column;
    }

    #history-drawer.visible {
      display: flex;
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .history-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: var(--bg-surface);
      border-radius: 4px;
      margin-bottom: 8px;
      gap: 12px;
    }

    .history-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .history-folder {
      flex: 1;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-status {
      font-size: 16px;
    }

    .history-status.success {
      color: var(--success);
    }

    .history-status.error {
      color: var(--error);
    }

    /* Error display */
    .error {
      color: var(--error);
      padding: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <h1>Blueprint</h1>
    <div class="toolbar-separator"></div>
    <button id="open-folder-btn" class="toolbar-btn" title="Open Folder">📂 Open</button>
    <span id="folder-name"></span>
    <div class="toolbar-separator"></div>
    <button id="implement-btn" class="toolbar-btn primary" title="Implement Blueprint">▶️ Implement</button>
    <button id="stop-btn" class="toolbar-btn" title="Stop">⏹️</button>
    <button id="clean-btn" class="toolbar-btn" title="Clean Workspace">🗑 Clean</button>
    <div class="toolbar-separator"></div>
    <select id="model-select" title="Model">
      <option value="">Loading models...</option>
    </select>
    <div id="user-display">
      <span class="user-login">Loading...</span>
    </div>
    <button id="settings-btn" class="toolbar-btn" title="Settings">⚙️</button>
  </div>

  <!-- Main container -->
  <div class="main-container">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span id="files-tab" class="sidebar-tab active">Files</span>
        <span id="git-tab" class="sidebar-tab">Git</span>
        <div class="sidebar-actions">
          <button id="new-file-btn" title="New File">📄</button>
          <button id="new-folder-btn" title="New Folder">📁</button>
          <button id="refresh-btn" title="Refresh">🔄</button>
          <button id="delete-btn" title="Delete">🗑️</button>
        </div>
      </div>
      <div id="files-panel" class="sidebar-panel active">
        <div id="file-tree"></div>
      </div>
      <div id="git-panel" class="sidebar-panel">
        <div id="git-list"></div>
      </div>
    </div>

    <div id="drag-handle-left" class="drag-handle-v"></div>

    <!-- Center panel (editor) -->
    <div id="center-panel">
      <div class="panel-header">
        <span id="edit-tab" class="panel-tab active">Edit</span>
        <span id="browser-tab" class="panel-tab">Browser</span>
        <span id="file-info" style="margin-left: auto; font-size: 12px; color: var(--text-muted);"></span>
        <span id="editor-status" style="font-size: 12px; color: var(--success); margin-left: 8px;"></span>
      </div>
      <div class="editor-content">
        <div id="edit-panel" class="editor-panel active">
          <textarea id="editor-textarea" placeholder="Open a file to start editing..."></textarea>
        </div>
        <div id="browser-panel" class="editor-panel">
          <div class="browser-toolbar">
            <input type="text" id="address-bar" placeholder="Enter URL...">
            <button id="go-btn">Go</button>
          </div>
          <iframe id="preview-iframe" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
        </div>
      </div>
      <div id="drag-handle-h" class="drag-handle-h"></div>
      <div id="terminal-panel">
        <div id="terminal-container"></div>
      </div>
    </div>

    <div id="drag-handle-right" class="drag-handle-v"></div>

    <!-- Right panel (Chat/Output) -->
    <div id="right-panel">
      <div class="panel-header">
        <span id="chat-tab" class="panel-tab">Chat</span>
        <span id="output-tab" class="panel-tab active">Output</span>
        <button id="save-output-btn" class="toolbar-btn" style="margin-left: auto;" title="Save Output">💾</button>
      </div>
      <div class="right-panel-content">
        <div id="chat-panel" class="chat-panel">
          <div id="chat-messages"></div>
          <div id="chat-indicator">Agent is responding...</div>
          <div class="chat-input-area">
            <textarea id="chat-input" placeholder="Ask about the blueprint..." rows="1"></textarea>
            <button id="chat-send-btn">Send</button>
          </div>
        </div>
        <div id="output-panel" class="output-panel active">
          <div class="output-header">
            <span id="implement-status" class="status"></span>
          </div>
          <div id="output-terminal"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <span class="setting-label">Theme</span>
          <select id="theme-select" class="setting-input">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Font Size</span>
          <input type="number" id="font-size-input" class="setting-input" min="10" max="24" value="14">
        </div>
        <div class="setting-row">
          <span class="setting-label">Temperature</span>
          <input type="number" id="temperature-input" class="setting-input" min="0" max="2" step="0.1" value="0">
        </div>
      </div>
      <div class="modal-footer">
        <button id="export-btn">Export State</button>
        <button id="import-btn">Import State</button>
        <button id="history-btn">History</button>
      </div>
    </div>
  </div>

  <!-- History Drawer -->
  <div id="history-drawer">
    <div class="modal-header">
      <h2>History</h2>
      <button class="close-btn">&times;</button>
    </div>
    <div id="history-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
