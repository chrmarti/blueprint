<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://avatars.githubusercontent.com data:; frame-src *; connect-src *;">
  <title>Blueprint Implementer</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    /* ── CSS Custom Properties ── */
    :root,
    [data-theme="dark"] {
      --bg: #1e1e1e;
      --bg-surface: #252526;
      --bg-input: #2d2d2d;
      --bg-hover: #2a2d2e;
      --bg-active: #37373d;
      --border: #3c3c3c;
      --text: #cccccc;
      --text-muted: #858585;
      --text-bright: #ffffff;
      --accent: #007acc;
      --accent-hover: #1a8ad4;
      --success: #4ec94e;
      --warning: #cca700;
      --error: #f44747;
      --scrollbar-bg: #1e1e1e;
      --scrollbar-thumb: #424242;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --bg-surface: #f3f3f3;
      --bg-input: #ffffff;
      --bg-hover: #e8e8e8;
      --bg-active: #d6d6d6;
      --border: #cccccc;
      --text: #333333;
      --text-muted: #717171;
      --text-bright: #000000;
      --accent: #007acc;
      --accent-hover: #0062a3;
      --success: #2ea043;
      --warning: #9d6b00;
      --error: #cb2431;
      --scrollbar-bg: #f3f3f3;
      --scrollbar-thumb: #c1c1c1;
    }

    /* ── Reset & Base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--scrollbar-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 4px;
    }

    /* ── App Shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      height: 36px;
      flex-shrink: 0;
    }

    #toolbar .app-title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-bright);
      white-space: nowrap;
    }

    #toolbar .separator {
      width: 1px;
      height: 18px;
      background: var(--border);
    }

    #folder-name {
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .toolbar-spacer {
      flex: 1;
    }

    #user-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .toolbar-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .toolbar-btn:hover {
      background: var(--bg-hover);
    }

    .toolbar-icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .toolbar-icon-btn:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .implement-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 3px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .implement-btn:hover {
      background: var(--accent-hover);
    }
    .implement-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Main Content Area ── */
    #content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 150px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      display: none;
    }

    .sidebar-tabs {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .sidebar-tab {
      padding: 6px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      user-select: none;
    }
    .sidebar-tab:hover {
      color: var(--text);
    }
    .sidebar-tab.active {
      color: var(--text-bright);
      border-bottom-color: var(--accent);
    }

    .sidebar-actions {
      display: flex;
      align-items: center;
      margin-left: auto;
      gap: 2px;
      padding-right: 4px;
    }

    .sidebar-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 5px;
      border-radius: 3px;
      line-height: 1;
    }
    .sidebar-action-btn:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    #files-pane, #git-pane {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #git-pane {
      display: none;
    }

    /* ── File Tree ── */
    .tree-entry {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
      white-space: nowrap;
    }
    .tree-entry:hover {
      background: var(--bg-hover);
    }
    .tree-entry.selected {
      background: var(--bg-active);
      color: var(--text-bright);
    }

    .tree-arrow {
      width: 12px;
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      text-align: center;
    }

    .tree-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .tree-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-children {
      /* children container for nested dirs */
    }

    .inline-input {
      display: block;
      width: calc(100% - 16px);
      margin: 2px 8px;
      padding: 2px 6px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 3px;
      outline: none;
    }

    /* ── Git Tab ── */
    .git-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      font-size: 13px;
    }

    .git-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .git-badge.git-modified { background: var(--warning); }
    .git-badge.git-added { background: var(--success); }
    .git-badge.git-deleted { background: var(--error); }
    .git-badge.git-untracked { background: var(--text-muted); }
    .git-badge.git-renamed { background: var(--warning); }

    .git-file {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .git-empty {
      padding: 16px 12px;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ── Drag Handles ── */
    .drag-handle {
      width: 4px;
      cursor: col-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .drag-handle:hover,
    .drag-handle:active {
      background: var(--accent);
    }
    .drag-handle.hidden {
      display: none;
    }

    .drag-handle-h {
      height: 4px;
      cursor: row-resize;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .drag-handle-h:hover,
    .drag-handle-h:active {
      background: var(--accent);
    }

    /* ── Editor Panel ── */
    #editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 200px;
      overflow: hidden;
    }

    .editor-tabs {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .editor-tab {
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      user-select: none;
    }
    .editor-tab:hover {
      color: var(--text);
    }
    .editor-tab.active {
      color: var(--text-bright);
      border-bottom-color: var(--accent);
    }

    #current-file-label {
      margin-left: auto;
      padding-right: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Edit Pane ── */
    #edit-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #editor-textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 12px 16px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      tab-size: 2;
    }

    /* ── Browser Pane ── */
    #browser-pane {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .address-bar-container {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #address-bar {
      flex: 1;
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
    }
    #address-bar:focus {
      border-color: var(--accent);
    }

    #preview-iframe {
      flex: 1;
      border: none;
      background: #fff;
    }

    /* ── Terminal Panel ── */
    #terminal-panel {
      height: 200px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .terminal-header {
      display: flex;
      align-items: center;
      padding: 3px 10px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .terminal-header .terminal-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── Output Panel ── */
    #output-panel {
      width: 400px;
      min-width: 200px;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    #output-panel.collapsed {
      display: none;
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .output-header .output-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .output-header .output-spacer {
      flex: 1;
    }

    .output-header-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 3px;
    }
    .output-header-btn:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .output-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .model-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .model-bar label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #model-select {
      flex: 1;
      padding: 3px 6px;
      font-size: 12px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      outline: none;
      min-width: 0;
    }

    #implement-status {
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 24px;
    }
    #implement-status.implementing {
      color: var(--accent);
    }
    #implement-status.success {
      color: var(--success);
    }
    #implement-status.error {
      color: var(--error);
    }

    #output-terminal {
      flex: 1;
      overflow: hidden;
    }

    /* ── History Drawer ── */
    #history-drawer {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    #history-drawer.open {
      transform: translateX(0);
    }

    .history-header {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .history-item:hover {
      background: var(--bg-hover);
    }

    .history-time {
      color: var(--text-muted);
      white-space: nowrap;
    }

    .history-model {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-status {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .history-status.success { color: var(--success); }
    .history-status.error { color: var(--error); }

    /* ── Settings Modal ── */
    #settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }
    #settings-modal.open {
      display: flex;
    }

    .settings-dialog {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 420px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .settings-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .settings-close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .settings-close-btn:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .settings-group {
      margin-bottom: 16px;
    }

    .settings-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .settings-group select,
    .settings-group input[type="number"],
    .settings-group input[type="range"] {
      width: 100%;
      padding: 4px 8px;
      font-size: 13px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
    }
    .settings-group select:focus,
    .settings-group input:focus {
      border-color: var(--accent);
    }

    .settings-group .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-group .slider-row input[type="range"] {
      flex: 1;
    }

    .settings-group .slider-value {
      font-size: 12px;
      color: var(--text);
      min-width: 24px;
      text-align: right;
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .settings-actions button {
      flex: 1;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
    }
    .settings-actions button:hover {
      background: var(--bg-hover);
    }

    /* ── Utilities ── */
    .text-muted { color: var(--text-muted); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div id="toolbar">
      <span class="app-title">Blueprint</span>
      <div class="separator"></div>
      <button id="open-folder-btn" class="toolbar-btn" title="Open Folder">📂 Open</button>
      <span id="folder-name"></span>
      <div class="separator"></div>
      <button id="implement-btn" class="implement-btn" title="Implement (Cmd+B)">▶ Implement</button>
      <button id="clean-btn" class="toolbar-btn" title="Clean workspace">🗑 Clean</button>
      <div class="toolbar-spacer"></div>
      <div id="user-info"></div>
      <button id="toggle-sidebar" class="toolbar-icon-btn" title="Toggle Sidebar">☰</button>
      <button id="toggle-output" class="toolbar-icon-btn" title="Toggle Output">⧉</button>
      <button id="settings-btn" class="toolbar-icon-btn" title="Settings">⚙</button>
    </div>

    <!-- Main Content -->
    <div id="content">
      <!-- Sidebar -->
      <div id="sidebar">
        <div class="sidebar-tabs">
          <div class="sidebar-tab active" data-sidebar-tab="files">Files</div>
          <div class="sidebar-tab" data-sidebar-tab="git">Git</div>
          <div class="sidebar-actions">
            <button id="new-file-btn" class="sidebar-action-btn" title="New File">📄</button>
            <button id="new-folder-btn" class="sidebar-action-btn" title="New Folder">📁</button>
            <button id="refresh-btn" class="sidebar-action-btn" title="Refresh">🔄</button>
            <button id="delete-btn" class="sidebar-action-btn" title="Delete">🗑️</button>
          </div>
        </div>
        <div id="files-pane">
          <div id="file-tree"></div>
        </div>
        <div id="git-pane">
          <div id="git-list"></div>
        </div>
      </div>

      <!-- Left Drag Handle -->
      <div id="drag-handle-left" class="drag-handle"></div>

      <!-- Editor Panel -->
      <div id="editor-panel">
        <div class="editor-tabs">
          <div class="editor-tab active" data-tab="edit">Edit</div>
          <div class="editor-tab" data-tab="browser">Browser</div>
          <span id="current-file-label"></span>
        </div>
        <div class="editor-body">
          <!-- Edit Pane -->
          <div id="edit-pane">
            <textarea id="editor-textarea" spellcheck="false" placeholder="Open a file to edit..."></textarea>
          </div>
          <!-- Browser Pane -->
          <div id="browser-pane">
            <div class="address-bar-container">
              <input id="address-bar" type="text" placeholder="Enter URL...">
            </div>
            <iframe id="preview-iframe" sandbox="allow-scripts allow-modals"></iframe>
          </div>
          <!-- Terminal Drag Handle -->
          <div id="drag-handle-terminal" class="drag-handle-h"></div>
          <!-- Terminal Panel -->
          <div id="terminal-panel">
            <div class="terminal-header">
              <span class="terminal-title">Terminal</span>
            </div>
            <div id="terminal-container"></div>
          </div>
        </div>
      </div>

      <!-- Right Drag Handle -->
      <div id="drag-handle-right" class="drag-handle"></div>

      <!-- Output Panel -->
      <div id="output-panel" style="position: relative;">
        <div class="output-header">
          <span class="output-title">Output</span>
          <span class="output-spacer"></span>
          <button id="save-output-btn" class="output-header-btn" title="Save Output">💾</button>
          <button id="history-btn" class="output-header-btn" title="History">📋</button>
        </div>
        <div class="output-body">
          <div class="model-bar">
            <label for="model-select">Model</label>
            <select id="model-select">
              <option value="">Loading models...</option>
            </select>
          </div>
          <div id="implement-status"></div>
          <div id="output-terminal"></div>
        </div>
        <!-- History Drawer -->
        <div id="history-drawer">
          <div class="history-header">History</div>
          <div class="history-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="settings-dialog">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close-btn" class="settings-close-btn">✕</button>
      </div>
      <div class="settings-group">
        <label for="theme-toggle">Theme</label>
        <select id="theme-toggle">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="settings-group">
        <label for="font-size-input">Font Size</label>
        <input id="font-size-input" type="number" min="10" max="24" value="14">
      </div>
      <div class="settings-group">
        <label>Temperature</label>
        <div class="slider-row">
          <input id="temperature-slider" type="range" min="0" max="1" step="0.1" value="0">
          <span id="temperature-value" class="slider-value">0</span>
        </div>
      </div>
      <div class="settings-actions">
        <button id="export-btn">Export State</button>
        <button id="import-btn">Import State</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
