<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueprint Implementer</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-surface: #2d2d2d;
      --bg-hover: #3e3e3e;
      --text: #d4d4d4;
      --text-muted: #808080;
      --text-bright: #ffffff;
      --accent: #0078d4;
      --accent-hover: #1e90ff;
      --border: #3e3e3e;
      --success: #4ec9b0;
      --warning: #dcdcaa;
      --error: #f14c4c;
      --editor-font-size: 14px;
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f3f3f3;
      --bg-surface: #e8e8e8;
      --bg-hover: #d4d4d4;
      --text: #1e1e1e;
      --text-muted: #6e6e6e;
      --text-bright: #000000;
      --border: #d4d4d4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .toolbar-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-bright);
    }

    .toolbar-separator {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    #workspace-name {
      font-size: 13px;
      color: var(--text-muted);
    }

    .toolbar-spacer {
      flex: 1;
    }

    .toolbar-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-btn:hover {
      background: var(--accent-hover);
    }

    .toolbar-btn.secondary {
      background: var(--bg-surface);
      color: var(--text);
    }

    .toolbar-btn.secondary:hover {
      background: var(--bg-hover);
    }

    .toolbar-icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 4px;
      font-size: 16px;
    }

    .toolbar-icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    #user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    .user-login {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Main layout */
    .main-container {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Sidebar */
    #sidebar {
      width: 250px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #sidebar.collapsed {
      width: 40px;
    }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-tab {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar-tab.active {
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }

    .sidebar-toolbar {
      display: flex;
      padding: 4px;
      gap: 2px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-toolbar button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 3px;
      font-size: 14px;
    }

    .sidebar-toolbar button:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .sidebar-content {
      flex: 1;
      overflow: auto;
    }

    #files-panel, #git-panel {
      height: 100%;
    }

    #git-panel {
      display: none;
    }

    /* File tree */
    #file-tree {
      padding: 4px 0;
    }

    .tree-item {
      user-select: none;
    }

    .tree-row {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .tree-row:hover {
      background: var(--bg-hover);
    }

    .tree-row.selected {
      background: var(--accent);
      color: white;
    }

    .tree-row.active {
      background: var(--bg-surface);
    }

    .tree-arrow {
      width: 16px;
      font-size: 10px;
      color: var(--text-muted);
    }

    .tree-indent {
      width: 16px;
    }

    .tree-icon {
      margin-right: 6px;
    }

    .tree-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-children {
      padding-left: 16px;
    }

    /* Git status */
    #git-list {
      padding: 8px;
    }

    .git-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
    }

    .git-badge {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    .git-badge.modified { background: var(--warning); color: #1e1e1e; }
    .git-badge.added { background: var(--success); color: #1e1e1e; }
    .git-badge.deleted { background: var(--error); color: white; }
    .git-badge.untracked { background: var(--text-muted); color: white; }
    .git-badge.renamed { background: var(--warning); color: #1e1e1e; }

    .no-changes {
      color: var(--text-muted);
      font-size: 13px;
      padding: 8px;
    }

    /* Drag handles */
    .drag-handle {
      background: var(--border);
      flex-shrink: 0;
    }

    .drag-handle:hover {
      background: var(--accent);
    }

    .drag-handle-v {
      width: 4px;
      cursor: col-resize;
    }

    .drag-handle-h {
      height: 4px;
      cursor: row-resize;
    }

    /* Editor panel (center) */
    #editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .editor-tabs {
      display: flex;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .editor-tab {
      padding: 8px 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
    }

    .editor-tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .editor-tab-spacer {
      flex: 1;
    }

    #current-file-title {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #edit-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    #browser-panel {
      flex: 1;
      display: none;
      flex-direction: column;
    }

    #editor-textarea {
      flex: 1;
      background: var(--bg-primary);
      color: var(--text);
      border: none;
      padding: 12px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, Monaco, monospace;
      font-size: var(--editor-font-size);
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    /* Browser preview */
    .address-bar {
      display: flex;
      padding: 8px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    #address-bar {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 13px;
    }

    #preview-iframe {
      flex: 1;
      border: none;
      background: white;
    }

    /* Terminal panel */
    #terminal-panel {
      height: 200px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    #terminal-container {
      flex: 1;
      padding: 4px;
    }

    /* Right panel */
    #right-panel {
      width: 400px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #right-panel.collapsed {
      width: 40px;
    }

    .right-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .right-tab {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .right-tab.active {
      color: var(--text);
      border-bottom: 2px solid var(--accent);
    }

    .right-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Chat panel */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #chat-messages {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }

    .chat-message {
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.5;
    }

    .chat-message.user {
      background: var(--accent);
      color: white;
      margin-left: auto;
    }

    .chat-message.assistant {
      background: var(--bg-surface);
      color: var(--text);
    }

    .chat-message.assistant pre {
      background: var(--bg-primary);
      padding: 8px;
      border-radius: 4px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .chat-message.assistant code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
    }

    .chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      min-height: 60px;
    }

    #chat-send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      align-self: flex-end;
    }

    #chat-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #chat-streaming-indicator {
      display: none;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Output panel */
    #output-panel {
      flex: 1;
      display: none;
      flex-direction: column;
    }

    .output-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }

    .output-header-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .output-header-spacer {
      flex: 1;
    }

    .output-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 14px;
    }

    .output-btn:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    #implement-status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 3px;
    }

    #implement-status.implementing {
      background: var(--accent);
      color: white;
    }

    #implement-status.success {
      background: var(--success);
      color: #1e1e1e;
    }

    #implement-status.error {
      background: var(--error);
      color: white;
    }

    #output-terminal {
      flex: 1;
      padding: 4px;
    }

    /* Settings modal */
    #settings-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #settings-modal.visible {
      display: flex;
    }

    .settings-content {
      background: var(--bg-secondary);
      border-radius: 8px;
      width: 400px;
      max-height: 80vh;
      overflow: auto;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .settings-title {
      font-size: 16px;
      font-weight: 600;
    }

    #close-settings-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
    }

    .settings-body {
      padding: 16px;
    }

    .setting-group {
      margin-bottom: 16px;
    }

    .setting-label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .setting-input {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .setting-row input[type="range"] {
      flex: 1;
    }

    #temperature-value {
      min-width: 30px;
      text-align: right;
      color: var(--text-muted);
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .settings-actions button {
      flex: 1;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #export-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    #import-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
    }

    #import-input {
      display: none;
    }

    /* History drawer */
    #history-drawer {
      display: none;
      position: fixed;
      top: 48px;
      right: 0;
      bottom: 0;
      width: 300px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      z-index: 100;
    }

    #history-drawer.visible {
      display: block;
    }

    .history-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
    }

    #history-list {
      padding: 8px;
      overflow: auto;
      height: calc(100% - 44px);
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .history-item:hover {
      background: var(--bg-hover);
    }

    .history-time {
      flex: 1;
      color: var(--text-muted);
    }

    .history-model {
      color: var(--text);
    }

    .history-status {
      font-size: 14px;
    }

    .history-item.success .history-status {
      color: var(--success);
    }

    .history-item.error .history-status {
      color: var(--error);
    }

    .no-history {
      color: var(--text-muted);
      font-size: 13px;
      padding: 16px;
      text-align: center;
    }

    /* Model select in toolbar */
    #model-select {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      color: var(--text);
      font-size: 12px;
      min-width: 150px;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .error {
      color: var(--error);
      padding: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-title">Blueprint Implementer</span>
    <div class="toolbar-separator"></div>
    <span id="workspace-name">No workspace</span>
    <div class="toolbar-spacer"></div>
    <select id="model-select">
      <option value="">Loading models...</option>
    </select>
    <button id="implement-btn" class="toolbar-btn">
      <span>▶</span> Implement
    </button>
    <button id="stop-btn" class="toolbar-btn secondary">
      <span>■</span> Stop
    </button>
    <button id="clean-btn" class="toolbar-btn secondary">
      🗑 Clean
    </button>
    <div class="toolbar-separator"></div>
    <div id="user-info">
      <span class="user-login">Loading...</span>
    </div>
    <button id="history-btn" class="toolbar-icon-btn" title="History">📋</button>
    <button id="settings-btn" class="toolbar-icon-btn" title="Settings">⚙️</button>
  </div>

  <!-- Main container -->
  <div class="main-container">
    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-tabs">
        <button id="files-tab" class="sidebar-tab active">Files</button>
        <button id="git-tab" class="sidebar-tab">Git</button>
      </div>
      <div class="sidebar-toolbar">
        <button id="new-file-btn" title="New File">📄</button>
        <button id="new-folder-btn" title="New Folder">📁</button>
        <button id="refresh-btn" title="Refresh">🔄</button>
        <button id="delete-btn" title="Delete">🗑️</button>
      </div>
      <div class="sidebar-content">
        <div id="files-panel">
          <div id="file-tree"></div>
        </div>
        <div id="git-panel">
          <div id="git-list"></div>
        </div>
      </div>
    </div>

    <div id="drag-handle-left" class="drag-handle drag-handle-v"></div>

    <!-- Editor panel -->
    <div id="editor-panel">
      <div class="editor-tabs">
        <button id="edit-tab" class="editor-tab active">Edit</button>
        <button id="browser-tab" class="editor-tab">Browser</button>
        <div class="editor-tab-spacer"></div>
        <span id="current-file-title">No file open</span>
      </div>
      <div class="editor-content">
        <div id="edit-panel">
          <textarea id="editor-textarea" placeholder="Select a file to edit..."></textarea>
        </div>
        <div id="browser-panel">
          <div class="address-bar">
            <input type="text" id="address-bar" placeholder="Enter URL...">
          </div>
          <iframe id="preview-iframe" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
        </div>
      </div>
      <div id="drag-handle-terminal" class="drag-handle drag-handle-h"></div>
      <div id="terminal-panel">
        <div class="terminal-header">Terminal</div>
        <div id="terminal-container"></div>
      </div>
    </div>

    <div id="drag-handle-right" class="drag-handle drag-handle-v"></div>

    <!-- Right panel -->
    <div id="right-panel">
      <div class="right-tabs">
        <button id="chat-tab" class="right-tab active">Chat</button>
        <button id="output-tab" class="right-tab">Output</button>
      </div>
      <div class="right-content">
        <div id="chat-panel">
          <div id="chat-messages"></div>
          <div id="chat-streaming-indicator">Agent is typing...</div>
          <div class="chat-input-area">
            <textarea id="chat-input" placeholder="Ask about the blueprint..."></textarea>
            <button id="chat-send-btn">Send</button>
          </div>
        </div>
        <div id="output-panel">
          <div class="output-header">
            <span class="output-header-title">Implementation Output</span>
            <div class="output-header-spacer"></div>
            <span id="implement-status"></span>
            <button id="save-output-btn" class="output-btn" title="Save Output">💾</button>
          </div>
          <div id="output-terminal"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="settings-content">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button id="close-settings-btn">&times;</button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <label class="setting-label">Theme</label>
          <select id="theme-toggle" class="setting-input">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="setting-group">
          <label class="setting-label">Editor Font Size</label>
          <input type="number" id="font-size" class="setting-input" min="10" max="24" value="14">
        </div>
        <div class="setting-group">
          <label class="setting-label">Temperature</label>
          <div class="setting-row">
            <input type="range" id="temperature" min="0" max="1" step="0.1" value="0">
            <span id="temperature-value">0</span>
          </div>
        </div>
      </div>
      <div class="settings-actions">
        <button id="export-btn">Export Project</button>
        <button id="import-btn">Import Project</button>
        <input type="file" id="import-input" accept=".json">
      </div>
    </div>
  </div>

  <!-- History Drawer -->
  <div id="history-drawer">
    <div class="history-header">Implementation History</div>
    <div id="history-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
